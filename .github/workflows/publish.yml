# Build & Publish workflow for mcp-copilot-acp
# Runs on every push to main: builds, tests, and publishes to npm if the version changed.
# Uses npm Trusted Publishing (OIDC) — no secrets required.
# Setup: configure trusted publisher at https://www.npmjs.com/package/mcp-copilot-acp/access
#
# (c) 2026 Brian W. Smith. All rights reserved. Licensed under the MIT License.

name: Build & Publish

on:
  push:
    branches: [main]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      - name: Check if version is already published
        id: version-check
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view mcp-copilot-acp version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL" >> "$GITHUB_OUTPUT"
          echo "remote=$REMOTE" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.version-check.outputs.should_publish == 'true'
        run: npm publish --provenance
